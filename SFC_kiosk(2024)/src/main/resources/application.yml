spring:
  application:
    name: waitingTime-kiosk
#  datasource:
#    url: jdbc:mysql://localhost:3306/waitingTimeKiosk?useSSL=false&serverTimezone=Asia/Seoul
#    username: root
#    password: ${spring.database.password}
#    driver-class-name: com.mysql.cj.jdbc.Driver
  datasource:
    url: jdbc:h2:file:./data/kioskdb
    username: sa
    password: 1325
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      settings:
        web-allow-others: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none # init: create / prod: none
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  profiles:
    include: private
  servlet:
    multipart:
      # prod: /home/ec2-user/SFC_kiosk/uploads || dev: C:/Users/Minchang Sung/desktop/capstone/waitingTime-kiosk/src/main/resources/static/
      location: /home/ec2-user/SFC_kiosk/uploads
      max-file-size: 10MB

logging:
  level:
    org:
      hibernate:
        SQL: debug
        orm:
          jdbc:
            bind: trace

server:
  address: 0.0.0.0 # dev: localhost / prod: 0.0.0.0
  port: 8080
